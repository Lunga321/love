<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You 💖</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(135deg, #ffd6e8, #ffc0cb);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Comic Sans MS', cursive;
  overflow: hidden;
}

/* Floating cupids */
.cupid {
  position: absolute;
  font-size: 30px;
  animation: float 8s linear infinite;
}

@keyframes float {
  0% {transform: translateY(100vh) scale(1);}
  100% {transform: translateY(-10vh) scale(1.5);}
}

.box {
  background: rgba(255, 182, 193, 0.95);
  padding: 40px;
  border-radius: 25px;
  text-align: center;
  box-shadow: 0 0 30px rgba(255,105,180,0.5);
  position: relative;
  z-index: 10;
}

h1 {
  color: white;
  margin-bottom: 20px;
}

button {
  padding: 12px 25px;
  margin: 10px;
  border: none;
  border-radius: 15px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

.yes {
  background: #ff69b4;
  color: white;
  box-shadow: 0 0 10px #ff69b4;
}

.yes:hover {
  transform: scale(1.1);
}

.no {
  background: #ff4d6d;
  color: white;
  position: absolute;
}

#message {
  display: none;
  margin-top: 20px;
  font-size: 26px;
  color: white;
  animation: fadeIn 1s ease forwards;
}

@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}
</style>

</head>

<body>

<div class="box">
  <div style="font-size:50px;">💘</div>
  <h1>Would you be my girlfriend?</h1>

<button class="yes" onclick="sayYes()">Yes 💖</button> <button class="no" id="noBtn">No 😢</button>

  <div id="message">
    Mr Brown was going to be mad if you picked no 😭💔<br>
    Love Busi ❤️
  </div>
</div>

<script>
function sayYes() {
  document.getElementById("message").style.display = "block";
}

/* Moving NO button */
const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", () => {
  const x = Math.random() * (window.innerWidth - 100);
  const y = Math.random() * (window.innerHeight - 100);
  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
});

/* Create floating cupids */
function createCupid() {
  const cupid = document.createElement("div");
  cupid.classList.add("cupid");
  cupid.innerHTML = "💘";
  cupid.style.left = Math.random() * 100 + "vw";
  cupid.style.fontSize = Math.random() * 20 + 25 + "px";
  document.body.appendChild(cupid);

  setTimeout(() => {
    cupid.remove();
  }, 8000);
}

setInterval(createCupid, 400);
</script>

</body>
</html>
